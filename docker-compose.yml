services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cashflow
      POSTGRES_USER: cashflow
      POSTGRES_PASSWORD: cashflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - "./infra/localstack:/etc/localstack/init/ready.d"
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    command: start-dev --import-realm
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/master HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  jaeger:
    image: jaegertracing/all-in-one:1.56
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  entry-service:
    build:
      context: ./entry-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=cashflow;Username=cashflow;Password=cashflow"
      Sqs__QueueUrl: "http://localstack:4566/000000000000/cashflow-lancamentos"
      Sqs__EndpointUrl: "http://localstack:4566"
      Sqs__Region: "us-east-1"
      Auth__JwksUri: "http://keycloak:8080/realms/cashflow/protocol/openid-connect/certs"
      Auth__Audience: "cashflow-api"
      Auth__Issuer: "http://keycloak:8080/realms/cashflow"
      Auth__ExternalIssuer: "http://localhost:8180/realms/cashflow"
      Otlp__Endpoint: "http://jaeger:4317"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  consolidated-service:
    build:
      context: ./consolidated-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      NODE_ENV: development
      PORT: "8081"
      REDIS_URL: "redis://redis:6379"
      SQS_QUEUE_URL: "http://localstack:4566/000000000000/cashflow-lancamentos"
      SQS_DLQ_URL: "http://localstack:4566/000000000000/cashflow-lancamentos-dlq"
      SQS_ENDPOINT_URL: "http://localstack:4566"
      AWS_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "test"
      AWS_SECRET_ACCESS_KEY: "test"
      JWT_JWKS_URI: "http://keycloak:8080/realms/cashflow/protocol/openid-connect/certs"
      JWT_AUDIENCE: "cashflow-api"
      JWT_ISSUER: "http://localhost:8180/realms/cashflow"
      OTLP_ENDPOINT: "http://jaeger:4317"
      OTEL_SERVICE_NAME: "consolidated-service"
      REDIS_SALDO_TTL_DAYS: "7"
    depends_on:
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  localstack_data:
  grafana_data:
