name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  entry-service:
    name: Entry Service — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: entry-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test tests/EntryService.Unit.Tests --no-build --configuration Release --verbosity normal

      - name: Integration Tests
        run: dotnet test tests/EntryService.Integration.Tests --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__Postgres: ""
          Sqs__EndpointUrl: ""

  consolidated-service:
    name: Consolidated Service — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consolidated-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: consolidated-service/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm test

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [entry-service, consolidated-service]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Entry Service image
        run: docker build -t entry-service:ci ./entry-service

      - name: Build Consolidated Service image
        run: docker build -t consolidated-service:ci ./consolidated-service
