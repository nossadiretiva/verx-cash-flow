name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  entry-service:
    name: Entry Service — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: entry-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test tests/EntryService.Unit.Tests --no-build --configuration Release --verbosity normal

      - name: Integration Tests
        # Testcontainers sobe o PostgreSQL via Docker — sem service container externo
        # JWT é sobrescrito por PostConfigure no WebApplicationFactory de testes
        run: dotnet test tests/EntryService.Integration.Tests --no-build --configuration Release --verbosity normal
        env:
          Auth__Audience: "cashflow-api"

  consolidated-service:
    name: Consolidated Service — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consolidated-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: consolidated-service/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm test

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [entry-service, consolidated-service]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Entry Service image
        uses: docker/build-push-action@v5
        with:
          context: ./entry-service
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Consolidated Service image
        uses: docker/build-push-action@v5
        with:
          context: ./consolidated-service
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  k6-smoke:
    name: k6 Smoke Test
    runs-on: ubuntu-latest
    needs: [entry-service, consolidated-service]
    # Smoke test só roda em PRs/pushes para main (requer stack Docker disponível)
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose stack
        run: docker compose up -d --wait
        timeout-minutes: 5

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6

      - name: Run smoke test
        # Resultados visíveis no log do CI; --summary-trend-stats para P95/P99
        run: k6 run infra/tests/load/smoke.js --summary-trend-stats='p(50),p(95),p(99)'

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  terraform-validate:
    name: Terraform — Format & Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform Format (auto-fix)
        # Formata em modo auto-fix — não bloqueia, mas registra arquivos alterados
        run: |
          terraform fmt -recursive
          git diff --name-only infra/terraform/ | while read f; do
            echo "::warning file=$f::Arquivo reformatado pelo CI. Execute 'terraform fmt -recursive infra/terraform/' localmente."
          done

      - name: Terraform Init (sem backend)
        run: terraform init -backend=false
        working-directory: infra/terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra/terraform
