global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: entry-service
    static_configs:
      - targets: ["entry-service:8080"]
    metrics_path: /metrics

  - job_name: consolidated-service
    static_configs:
      - targets: ["consolidated-service:8081"]
    metrics_path: /metrics
